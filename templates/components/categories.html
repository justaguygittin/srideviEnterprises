<section class="categories-section">

    <div class="container">

        <!-- Section Heading -->

        <div class="section-heading text-center">

            <h2>Shop by Category</h2>

            <p>
                Explore our product departments and find the perfect products for your home.
            </p>

        </div>

        <!-- Category Cards -->

        <div class="row g-4">

            {% for department in departments %}
            <div class="col-lg-3 col-md-6">

                <a href="{{ url_for('customer.products', department=department.Department) }}" class="category-card">

                    <img src="{{ url_for('static', filename=department.image_path) }}" alt="{{ department.Department }}">

                    <div class="category-overlay">

                        <h3>{{ department.Department }}</h3>

                        <p>{{ department.total_products }} product{{ '' if department.total_products == 1 else 's' }}</p>

                    </div>

                </a>

            </div>
            {% endfor %}

        </div>

    </div>

</section>
